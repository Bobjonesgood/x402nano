services:
  - type: web
    name: x402nano
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run render:start
    envVars:
      - key: X402_PAYMENT_MODE
        value: facilitator
      - key: X402_FACILITATOR_URL
        value: https://api.cdp.coinbase.com/platform/v2/x402
      - key: SELLER_ADDRESS
        value: 0x4cc3831eB479aCFb6D44631d4a30814508Cf52d3
      - key: X402_NETWORK
        value: eip155:8453
      - key: X402_ASSET
        value: USDC
      - key: PRICE_USDC
        value: "0.05"
      - key: CDP_API_KEY_ID
        sync: false
      - key: CDP_API_KEY_SECRET
        sync: false
