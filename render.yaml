services:
  - type: web
    name: payment-aware-sandbox
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run render:start
    envVars:
      - key: X402_PAYMENT_MODE
        value: facilitator
      - key: X402_FACILITATOR_URL
        value: https://api.cdp.coinbase.com/platform/v2/x402
      - key: SELLER_ADDRESS
        value: 0x4cc3831eB479aCFb6D44631d4a30814508Cf52d3
      - key: X402_NETWORK
        value: eip155:8453
      - key: X402_ASSET
        value: USDC
      - key: PRICE_USDC
        value: "0.05"
      - key: LEAD_PACK_MODE
        value: production
      - key: PREMIUM_LEAD_PACK_JSON
        sync: false
      - key: LEAD_HANDOFF_ENABLED
        value: "false"
      - key: LEADNESTAI_API_URL
        value: https://www.leadnestai.net
      - key: LEADNESTAI_SOURCE_ID
        value: x402nano
      - key: AI_MODEL
        value: llama-3.1-8b-instant
      - key: LEADNESTAI_INGEST_SECRET
        sync: false
      - key: CDP_API_KEY_ID
        sync: false
      - key: CDP_API_KEY_SECRET
        sync: false
