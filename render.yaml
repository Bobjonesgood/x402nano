services:
  - type: web
    name: x402nano
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm run render:start
    healthCheckPath: /health
    numInstances: 1
    disk:
      name: x402nano-alert-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: X402_PAYMENT_MODE
        value: facilitator
      - key: X402_FACILITATOR_URL
        value: https://api.cdp.coinbase.com/platform/v2/x402
      - key: SELLER_ADDRESS
        value: 0x4cc3831eB479aCFb6D44631d4a30814508Cf52d3
      - key: X402_NETWORK
        value: eip155:8453
      - key: X402_ASSET
        value: USDC
      - key: PRICE_USDC
        value: "0.05"
      - key: ALERT_REGISTRATION_PRICE_USDC
        value: "0.08"
      - key: ALERT_DB_PATH
        value: /data/alerts.db
      - key: CDP_API_KEY_ID
        sync: false
      - key: CDP_API_KEY_SECRET
        sync: false
