name: Render Keepalive

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: render-keepalive
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping x402nano health
        run: |
          curl --fail --silent --show-error \
            --max-time 60 --retry 3 --retry-delay 5 \
            https://x402nano.onrender.com/health
